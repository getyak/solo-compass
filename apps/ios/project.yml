name: SoloCompass
options:
  bundleIdPrefix: com.solocompass
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: "6RG2F8YY59"
    MARKETING_VERSION: "1.1.0"
    CURRENT_PROJECT_VERSION: "2"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    SWIFT_STRICT_CONCURRENCY: complete
    CODE_SIGN_STYLE: Manual

targets:
  SoloCompass:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SoloCompass
        excludes:
          - Tests/**
      # GeneratedSecrets.swift is .gitignored (emitted by the preBuildScript
      # from .env), so xcodegen's directory scan skips it and leaves it out of
      # Compile Sources — `Secrets` then fails to resolve on a clean build.
      # Declare it explicitly with optional:true so it compiles even though it
      # may not exist at project-generation time.
      - path: SoloCompass/Config/GeneratedSecrets.swift
        optional: true
    resources:
      - path: SoloCompass/Resources/Configuration.storekit
        buildPhase: resources
      - path: SoloCompass/Resources/PrivacyInfo.xcprivacy
        buildPhase: resources
    info:
      path: SoloCompass/Resources/Info.plist
      properties:
        CFBundleDevelopmentRegion: en
        CFBundleLocalizations:
          - en
          - zh-Hans
        # US-026: opt the app into Live Activities so LiveActivityService can
        # start Dynamic Island activities. This is local-only — it needs no APNs
        # / aps-environment entitlement (activities update via ActivityKit, not
        # remote push), so it stays clear of the disabled push provisioning.
        NSSupportsLiveActivities: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleIconName: AppIcon
        ITSAppUsesNonExemptEncryption: false
        NSLocationWhenInUseUsageDescription: "Solo Compass uses your location to show experiences near you on the map."
        NSLocationAlwaysAndWhenInUseUsageDescription: "Solo Compass uses background location to alert you when you're near a place worth visiting — even when the app is closed."
        UIBackgroundModes:
          - location
          # US-021: APNs background push (`remote-notification`) is temporarily
          # disabled until the App Store provisioning profile is regenerated with
          # the Push Notifications capability (Apple Developer portal + `match
          # appstore --force`). Re-add once the profile in solo-compass-certs
          # includes aps-environment, otherwise Release archive code-signing fails.
        NSSpeechRecognitionUsageDescription: "Solo Compass uses speech recognition so you can describe what you're looking for by voice."
        NSMicrophoneUsageDescription: "Solo Compass uses the microphone for voice search."
        NSCameraUsageDescription: "Solo Compass uses the camera so you can photograph a place when you add it to the map."
        NSPhotoLibraryUsageDescription: "Solo Compass needs access to your photos so you can attach an image to a place you add."
        LSApplicationQueriesSchemes:
          - comgooglemaps
          - iosamap
        # solocompass:// scheme — share-sheet / paste-link entry routed by
        # SoloCompassApp.body.onOpenURL → NotificationService.handleURL.
        # Recognized paths: experience/<id> · route/<id> · chat/<id> · friends.
        CFBundleURLTypes:
          - CFBundleURLName: com.daypage.solocompass
            CFBundleURLSchemes:
              - solocompass
        # localhost ATS exception is only exercised in DEBUG. Release builds short-circuit
        # in ReviewsService before any network request when SOLO_API_BASE_URL is unset.
        NSAppTransportSecurity:
          NSExceptionDomains:
            localhost:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.solocompass.app
        INFOPLIST_FILE: SoloCompass/Resources/Info.plist
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Distribution"
        DEVELOPMENT_TEAM: "6RG2F8YY59"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: SoloCompass/Resources/SoloCompass.entitlements
      properties:
        # US-021: APNs `aps-environment` entitlement is temporarily removed until
        # the App Store provisioning profile (solo-compass-certs, pulled readonly
        # by CI) is regenerated with the Push Notifications capability. With the
        # entitlement present but absent from the profile, Release archive signing
        # fails: "Provisioning profile ... doesn't include the aps-environment
        # entitlement". Re-add `aps-environment: development` once the portal +
        # `match appstore --force` have refreshed the profile.
        com.apple.developer.applesignin:
          - Default
    preBuildScripts:
      - name: Generate Secrets from .env
        script: |
          if [ -f "${SRCROOT}/../../scripts/generate_secrets.sh" ]; then
            bash "${SRCROOT}/../../scripts/generate_secrets.sh"
          else
            echo "[generate_secrets] script not found at ${SRCROOT}/../../scripts/generate_secrets.sh — skipping" >&2
          fi
        inputFiles:
          - $(SRCROOT)/../../.env
          - $(SRCROOT)/../../scripts/generate_secrets.sh
        outputFiles:
          - $(SRCROOT)/SoloCompass/Config/GeneratedSecrets.swift
        basedOnDependencyAnalysis: true
    dependencies:
      - package: Supabase
        product: Supabase
      - package: Sentry
        product: Sentry
      - package: swift-markdown-ui
        product: MarkdownUI
      # Embed the Live Activities widget extension into the app bundle. Without
      # this dependency the extension builds but is never copied into
      # SoloCompass.app/PlugIns, so iOS can't surface the Dynamic Island UI.
      - target: SoloCompassWidgets

  # Live Activities / Dynamic Island widget extension (US-026). Renders the four
  # Live Activity scenarios (route / countdown / recording / compile) on the
  # Lock Screen and in the Dynamic Island. The main app drives state via
  # LiveActivityService; this extension only renders ContentState — it has no
  # app services, no network, and no APNs (activities update locally).
  SoloCompassWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      # The extension's own SwiftUI widget code.
      - path: SoloCompassWidgets
      # The ActivityAttributes contract, compiled into BOTH targets so the app
      # and the widget agree on the ContentState shape. Single source of truth.
      - path: SoloCompass/Shared/SoloCompassActivityAttributes.swift
    info:
      path: SoloCompassWidgets/Info.plist
      properties:
        CFBundleDisplayName: SoloCompass
        # Inherit version/build from the target's build settings so the embedded
        # extension always matches the host app — App Store rejects a mismatch.
        # The TestFlight workflow rewrites MARKETING_VERSION / CURRENT_PROJECT_VERSION
        # in pbxproj for every target, and these refs pick that up.
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.solocompass.app.widgets
        INFOPLIST_FILE: SoloCompassWidgets/Info.plist
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Distribution"
        DEVELOPMENT_TEAM: "6RG2F8YY59"
        SKIP_INSTALL: NO
        # App Store rejects a build whose embedded extension version/build don't
        # match the host app. These pbxproj keys are rewritten by the TestFlight
        # workflow's global sed (same as the main app's), and the widget
        # Info.plist references them via $(MARKETING_VERSION) /
        # $(CURRENT_PROJECT_VERSION). The literals below are seed values only,
        # kept in step with the project-level defaults at the top of this file.
        MARKETING_VERSION: "1.1.0"
        CURRENT_PROJECT_VERSION: "2"

  SoloCompassTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SoloCompass/Tests
    resources:
      - path: SoloCompass/Resources/Configuration.storekit
        buildPhase: resources
      - path: SoloCompass/Resources/JSON/seed_experiences.json
        buildPhase: resources
      - path: SoloCompass/Resources/JSON/seed_routes.json
        buildPhase: resources
      - path: SoloCompass/Resources/JSON/seed_users.json
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.solocompass.tests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_ALLOWED: NO
        STOREKIT_CONFIGURATION: SoloCompass/Resources/Configuration.storekit
    dependencies:
      - target: SoloCompass

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.0.0
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: 8.36.0
  swift-markdown-ui:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: 2.4.1

schemes:
  SoloCompass:
    build:
      targets:
        SoloCompass: all
    run:
      config: Debug
    test:
      config: Debug
      # StoreKit unit tests need the local .storekit config wired into the
      # *test action* (the STOREKIT_CONFIGURATION build setting alone is not
      # honored by the test runner), otherwise the bare simulator returns
      # zero products and Code=3 (#134).
      storeKitConfiguration: SoloCompass/Resources/Configuration.storekit
      targets:
        - SoloCompassTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
